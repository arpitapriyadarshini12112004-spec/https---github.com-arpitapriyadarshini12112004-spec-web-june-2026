<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Input</title>
</head>
    <h1 style="text-align: center;">Novel Serivce Login</h1>

    <form action="#">
    <label for="user name">User Name:</label>
    <input type="user name" id="user name" name="user name" placeholder="Enter user name">
    
    <br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter password">

    <br><br>

     <label for="city of">City of:</label>
     <input type="city" id="city of" name="city of" placeholder="Enter city ">

     <br><br>

      <label for="employement">Employement:</label>
      <input type="employement" id="employement" name="employement" placeholder="Enter employement">

      <br><br>

      <label for="Web server">Web server:</label>
      <select id="Web Server" name="Web sever">
        <option value="">--Choose a server--</option>
        <option value="chrome">Chrome</option>
        <option value="firefox">Firefox</option>
      </select>

      <br><br>

       <label for="please specify your role">Please specify your role:</label><br>
       <input type="radio" id="Admin" name="please specify your role" placeholder="please specify your role"><label for="Admin">Admin</label><br>
       <input type="radio" id="Employement" name="please specify your role" placeholder="please specify your role"><label for="Employement">Employement</label><br>
       <input type="radio" id="Manager" name="please specify your role" placeholder="please specify your role"><label for="Manager">Manager</label><br>
       <input type="radio" id="Guest" name="please specify your role" placeholder="please specify your role"><label for="Guest">Guest</label>
       

      <br><br>

      <label for="Single Sign-on to the following">Single Sign-on to the following:</label><br>
      <input type="checkbox" id="mail" name="Single Sign-on to the following" placeholder="please specify your role"><label for="mail">Mail</label> <br>
      <input type="checkbox" id="payroll" name="Single Sign-on to the following" placeholder="please specify your role"><label for="payroll">Payroll</label><br>
      <input type="checkbox" id="Self-service" name="Single Sign-on to the following" placeholder="please specify your role"><label for="Self-service">Self-Service</label>
  
     <br><br>

<p style="text-align: center;">
    <button type="submit" >Login</button>
     <button type="reset">Reset</button>
</p>

    </form>
  </body>
</html>
